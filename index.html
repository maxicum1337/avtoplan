<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АвтоПлан | База данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a32 0%, #0f1e24 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ЭКРАН ВХОДА */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background: white;
            border-radius: 64px;
            padding: 48px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            font-size: 2rem;
            color: #1a3b44;
            margin-bottom: 12px;
        }

        .login-box input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            margin: 20px 0;
        }

        .login-box button {
            background: #1f4e5e;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #0f3a46;
        }

        .error-msg {
            color: #c44536;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        .main-app {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-bar {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1f4e5e;
        }

        .card {
            background: white;
            border-radius: 56px;
            overflow: hidden;
        }

        .header {
            background: #0f2b36;
            padding: 24px 32px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        .content {
            padding: 32px;
        }

        .voice-area {
            background: #f0f4fa;
            border-radius: 48px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .mic-btn {
            background: #1e3b46;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 100px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .mic-btn.listening {
            background: #c44536;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .transcript-box {
            background: white;
            border-radius: 32px;
            padding: 15px 20px;
            margin-top: 15px;
            border-left: 5px solid #2c7da0;
        }

        .save-btn {
            background: #0f2b36;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 20px 0;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            font-size: 1rem;
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2edf7;
        }

        th {
            background: #f8fafd;
            color: #1f4e5e;
        }

        .delete-btn {
            background: #c44536;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔐 АвтоПлан</h2>
        <p>Вход для руководителя</p>
        <input type="password" id="passwordInput" placeholder="Введите пароль">
        <button id="loginBtn">Войти</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="mainApp" class="main-app">
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-number" id="totalCount">0</div>
            <div>Всего записей</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="todayCount">0</div>
            <div>За сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="weekCount">0</div>
            <div>За неделю</div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <h1>🔧 АвтоПлан | База данных</h1>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>
        <div class="content">
            <div class="voice-area">
                <button id="micBtn" class="mic-btn">🎙️ Голосовая запись</button>
                <div class="transcript-box">
                    <strong>📝 Распознанный текст:</strong><br>
                    <span id="transcriptText">—</span>
                </div>
            </div>

            <button id="saveBtn" class="save-btn">💾 Сохранить в базу и отправить на почту</button>

            <div class="controls">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск...">
                <select id="filterSelect" class="filter-select">
                    <option value="all">Все записи</option>
                    <option value="today">Сегодня</option>
                    <option value="week">Эта неделя</option>
                </select>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Дата</th><th>Время</th><th>Текст</th><th></th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="4" style="text-align:center;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== ПАРОЛЬ ==========
    const PASSWORD = "BossAuto2025";
    
    // ========== ПЕРЕМЕННЫЕ ==========
    let currentTranscript = "";
    let recognition = null;
    let isListening = false;
    let db = null;
    
    // ========== ЭЛЕМЕНТЫ ==========
    const loginOverlay = document.getElementById('loginOverlay');
    const mainApp = document.getElementById('mainApp');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const logoutBtn = document.getElementById('logoutBtn');
    const micBtn = document.getElementById('micBtn');
    const saveBtn = document.getElementById('saveBtn');
    const transcriptSpan = document.getElementById('transcriptText');
    const searchInput = document.getElementById('searchInput');
    const filterSelect = document.getElementById('filterSelect');
    const tableBody = document.getElementById('tableBody');
    const totalSpan = document.getElementById('totalCount');
    const todaySpan = document.getElementById('todayCount');
    const weekSpan = document.getElementById('weekCount');
    const toast = document.getElementById('toast');
    
    // ========== ФУНКЦИИ ==========
    function showToast(msg) {
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }
    
    // ВХОД
    function doLogin() {
        const pass = passwordInput.value;
        console.log('Пароль:', pass);
        
        if (pass === PASSWORD) {
            localStorage.setItem('auth', 'true');
            loginOverlay.style.display = 'none';
            mainApp.style.display = 'block';
            initDatabase();
            initSpeech();
            showToast('✅ Добро пожаловать!');
        } else {
            errorMsg.textContent = '❌ Неверный пароль!';
            setTimeout(() => errorMsg.textContent = '', 2000);
        }
    }
    
    // ВЫХОД
    function doLogout() {
        localStorage.removeItem('auth');
        loginOverlay.style.display = 'flex';
        mainApp.style.display = 'none';
        if (recognition && isListening) recognition.stop();
        showToast('🔒 Вы вышли');
    }
    
    // ПРОВЕРКА АВТОРИЗАЦИИ
    function checkAuth() {
        const auth = localStorage.getItem('auth');
        if (auth === 'true') {
            loginOverlay.style.display = 'none';
            mainApp.style.display = 'block';
            initDatabase();
            initSpeech();
        } else {
            loginOverlay.style.display = 'flex';
            mainApp.style.display = 'none';
        }
    }
    
    // ========== БАЗА ДАННЫХ (IndexedDB) ==========
    function initDatabase() {
        const request = indexedDB.open("AutoPlanDB", 2);
        
        request.onerror = function() {
            showToast('❌ Ошибка открытия БД');
        };
        
        request.onsuccess = function(event) {
            db = event.target.result;
            console.log('БД открыта');
            loadRecords();
        };
        
        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("records")) {
                const store = db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
                store.createIndex("date", "date");
                store.createIndex("createdAt", "createdAt");
                console.log('Таблица создана');
            }
        };
    }
    
    function saveRecordToDB(text) {
        return new Promise((resolve, reject) => {
            if (!db) {
                reject('Нет БД');
                return;
            }
            
            const transaction = db.transaction(["records"], "readwrite");
            const store = transaction.objectStore("records");
            
            const record = {
                text: text,
                date: new Date().toISOString().split('T')[0],
                time: new Date().toLocaleTimeString('ru-RU'),
                createdAt: Date.now()
            };
            
            const request = store.add(record);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    
    function loadRecords() {
        if (!db) return;
        
        const transaction = db.transaction(["records"], "readonly");
        const store = transaction.objectStore("records");
        const index = store.index("createdAt");
        const request = index.openCursor(null, "prev");
        
        const records = [];
        
        request.onsuccess = function(event) {
            const cursor = event.target.result;
            if (cursor) {
                records.push(cursor.value);
                cursor.continue();
            } else {
                applyFilterAndSearch(records);
                updateStats(records);
            }
        };
    }
    
    function applyFilterAndSearch(records) {
        const filter = filterSelect.value;
        const search = searchInput.value.toLowerCase();
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        
        let filtered = [...records];
        
        if (filter === 'today') {
            filtered = filtered.filter(r => r.date === today);
        } else if (filter === 'week') {
            filtered = filtered.filter(r => new Date(r.createdAt) >= weekAgo);
        }
        
        if (search) {
            filtered = filtered.filter(r => r.text.toLowerCase().includes(search));
        }
        
        renderTable(filtered);
    }
    
    function renderTable(records) {
        if (records.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">📭 Нет записей</td></tr>';
            return;
        }
        
        tableBody.innerHTML = records.map(record => `
            <tr>
                <td>${record.date}</td>
                <td>${record.time}</td>
                <td>${escapeHtml(record.text)}</td>
                <td><button class="delete-btn" onclick="deleteRecord(${record.id})">🗑️</button></td>
            </tr>
        `).join('');
    }
    
    window.deleteRecord = function(id) {
        if (!db) return;
        const transaction = db.transaction(["records"], "readwrite");
        const store = transaction.objectStore("records");
        store.delete(id);
        transaction.oncomplete = () => {
            showToast('✅ Удалено');
            loadRecords();
        };
    };
    
    function updateStats(records) {
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        
        totalSpan.textContent = records.length;
        todaySpan.textContent = records.filter(r => r.date === today).length;
        weekSpan.textContent = records.filter(r => new Date(r.createdAt) >= weekAgo).length;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== ОТПРАВКА НА ПОЧТУ ==========
    async function sendEmail(text) {
        try {
            const response = await fetch("https://formsubmit.co/ajax/vimana-avto@yandex.ru", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    _subject: `[АВТОСЕРВИС] Запись: ${text.substring(0, 50)}`,
                    message: `🔧 НОВАЯ ЗАПИСЬ\n\n${text}\n\nДата: ${new Date().toLocaleString('ru-RU')}`,
                    _captcha: "false"
                })
            });
            return response.ok;
        } catch(e) {
            return false;
        }
    }
    
    // ========== СОХРАНЕНИЕ ==========
    async function saveCurrent() {
        if (!currentTranscript || currentTranscript.trim() === '') {
            showToast('❌ Сначала скажите фразу в микрофон');
            return;
        }
        
        try {
            await saveRecordToDB(currentTranscript);
            const emailSent = await sendEmail(currentTranscript);
            showToast(emailSent ? '✅ Сохранено в БД и отправлено на почту' : '⚠️ Сохранено в БД, но письмо не ушло');
            currentTranscript = '';
            transcriptSpan.textContent = '—';
            loadRecords();
        } catch(e) {
            showToast('❌ Ошибка сохранения');
        }
    }
    
    // ========== ГОЛОС ==========
    function initSpeech() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            transcriptSpan.innerHTML = '❌ Ваш браузер не поддерживает голосовой ввод';
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            micBtn.textContent = '🔴 Слушаю...';
        };
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            currentTranscript = text;
            transcriptSpan.textContent = text;
            showToast('🎙️ Текст распознан');
        };
        
        recognition.onerror = () => {
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎙️ Голосовая запись';
            showToast('⚠️ Ошибка, попробуйте ещё раз');
        };
        
        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎙️ Голосовая запись';
        };
    }
    
    function startListening() {
        if (!recognition) {
            showToast('Голос не поддерживается');
            return;
        }
        if (isListening) recognition.stop();
        try {
            recognition.start();
        } catch(e) {
            showToast('Разрешите доступ к микрофону');
        }
    }
    
    // ========== ОБРАБОТЧИКИ ==========
    loginBtn.addEventListener('click', doLogin);
    logoutBtn.addEventListener('click', doLogout);
    micBtn.addEventListener('click', startListening);
    saveBtn.addEventListener('click', saveCurrent);
    searchInput.addEventListener('input', () => loadRecords());
    filterSelect.addEventListener('change', () => loadRecords());
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    
    // ========== ЗАПУСК ==========
    checkAuth();
</script>
</body>
</html>
