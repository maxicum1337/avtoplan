<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>АвтоПлан | Приватный кабинет начальника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a32 0%, #0f1e24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 64px;
            padding: 48px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            font-size: 2rem;
            color: #1a3b44;
            margin-bottom: 12px;
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            outline: none;
            margin-bottom: 20px;
        }

        .login-btn {
            background: #1f4e5e;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .login-btn:hover { background: #0f3a46; }
        .error-msg { color: #c44536; font-size: 0.85rem; margin-top: 16px; }

        .main-app { 
            display: none; 
            width: 100%; 
            max-width: 950px; 
        }
        
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #0f2b36;
            padding: 24px 32px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .content { padding: 32px; }
        
        .voice-main-area {
            background: #f0f4fa;
            border-radius: 48px;
            padding: 20px 24px;
            margin-bottom: 28px;
        }
        
        .mic-button {
            background: #1e3b46;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 100px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        
        .mic-button.listening {
            background: #c44536;
            animation: pulse 1.2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }
        
        .voice-status-box {
            background: white;
            border-radius: 40px;
            padding: 14px 20px;
            margin-top: 18px;
            border-left: 5px solid #2c7da0;
        }
        
        .full-transcript-area {
            background: #e9f0f5;
            border-radius: 28px;
            padding: 12px 20px;
            margin-top: 12px;
        }
        
        .fields-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 24px 0;
        }
        
        .preview-card {
            flex: 1;
            background: #f8fafd;
            border-radius: 32px;
            padding: 14px 18px;
            border: 1px solid #e2edf7;
        }
        
        .preview-label { font-size: 0.7rem; font-weight: 700; color: #5f7f92; }
        .preview-value { font-weight: 700; margin-top: 6px; color: #0f2b36; }
        
        button.primary {
            background: #0f2b36;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin: 16px 0;
        }
        
        .records-list {
            margin-top: 32px;
            background: #f1f5f9;
            border-radius: 32px;
            overflow: hidden;
        }
        
        .records-header {
            padding: 18px 24px;
            font-weight: 800;
            border-bottom: 2px dashed #cbdbe0;
        }
        
        .record-item {
            background: white;
            margin: 12px 16px;
            padding: 14px 20px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .record-text { font-weight: 600; color: #10343f; flex: 1; }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 3000;
        }
        
        .admin-badge { background: #eab308; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🔐 АвтоПлан PRO</h2>
        <p>Только для руководителя автосервиса</p>
        <input type="password" id="passwordInput" class="login-input" placeholder="Введите пароль" autocomplete="off">
        <button class="login-btn" id="loginBtn">🔓 Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="card">
        <div class="header">
            <h1>🔧 АвтоПлан | Начальник</h1>
            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
        <div class="content">
            <div class="voice-main-area">
                <button class="mic-button" id="mainMicBtn">
                    🎙️ Голосовая запись
                </button>
                <div class="voice-status-box" id="voiceStatusBox">
                    💡 Скажите фразу, весь текст будет отправлен на почту
                </div>
                <div class="full-transcript-area">
                    📝 <strong>Распознанный текст:</strong> <span id="recognizedFullText">—</span>
                </div>
            </div>

            <button class="primary" id="confirmRecordBtn">
                ✉️ Отправить на почту
            </button>

            <div class="records-list">
                <div class="records-header">📋 Журнал записей</div>
                <div id="recordsContainer">
                    <div style="padding: 24px; text-align:center;">Нет записей</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    const MASTER_PASSWORD = "BossAuto2025";
    let isAuthorized = false;
    let appointments = [];
    let currentFullTranscript = "";
    let recognition = null;
    let isListening = false;

    // Элементы
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const confirmBtn = document.getElementById('confirmRecordBtn');
    const micBtn = document.getElementById('mainMicBtn');
    const recognizedSpan = document.getElementById('recognizedFullText');
    const voiceStatusBox = document.getElementById('voiceStatusBox');

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }

    // Вход в систему
    function doLogin() {
        const pass = passwordInput.value;
        console.log('Введён пароль:', pass);
        
        if (pass === MASTER_PASSWORD) {
            localStorage.setItem('auto_service_auth', 'true');
            isAuthorized = true;
            
            // ПРИНУДИТЕЛЬНО скрываем экран входа
            loginScreen.style.display = 'none';
            mainApp.style.display = 'block';
            
            loginError.textContent = '';
            passwordInput.value = '';
            
            loadAppointments();
            initSpeech();
            showToast('✅ Добро пожаловать, начальник!');
        } else {
            loginError.textContent = '❌ Неверный пароль!';
            passwordInput.value = '';
            setTimeout(() => {
                if (loginError) loginError.textContent = '';
            }, 2000);
        }
    }

    // Выход
    function doLogout() {
        localStorage.removeItem('auto_service_auth');
        isAuthorized = false;
        if (recognition && isListening) {
            try { recognition.stop(); } catch(e) {}
        }
        loginScreen.style.display = 'flex';
        mainApp.style.display = 'none';
        showToast('🔒 Вы вышли из системы');
    }

    // Проверка авторизации при загрузке
    function checkAuth() {
        const auth = localStorage.getItem('auto_service_auth');
        console.log('Проверка авторизации:', auth);
        if (auth === 'true') {
            isAuthorized = true;
            loginScreen.style.display = 'none';
            mainApp.style.display = 'block';
            loadAppointments();
            initSpeech();
        } else {
            loginScreen.style.display = 'flex';
            mainApp.style.display = 'none';
        }
    }

    // Загрузка записей
    function loadAppointments() {
        const stored = localStorage.getItem('auto_service_appointments');
        if (stored) {
            try {
                appointments = JSON.parse(stored);
            } catch(e) { appointments = []; }
        }
        if (!appointments.length) {
            appointments = [{
                fullText: "Тестовая запись: Митсубиси Лансер замена масла",
                createdAt: Date.now()
            }];
            saveAppointments();
        }
        renderRecords();
    }

    function saveAppointments() {
        localStorage.setItem('auto_service_appointments', JSON.stringify(appointments));
    }

    function renderRecords() {
        const container = document.getElementById('recordsContainer');
        if (!container) return;
        if (!appointments.length) {
            container.innerHTML = '<div style="padding: 24px; text-align:center;">📭 Нет записей</div>';
            return;
        }
        let html = '';
        appointments.slice(0, 10).forEach(rec => {
            const shortText = rec.fullText.length > 60 ? rec.fullText.substring(0, 60) + '…' : rec.fullText;
            html += `<div class="record-item">
                        <div class="record-text">🗣️ ${escapeHtml(shortText)}</div>
                        <div class="admin-badge">✉️</div>
                    </div>`;
        });
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Отправка email
    async function sendEmail(text) {
        const email = "vimana-avto@yandex.ru";
        const subject = `[АВТОСЕРВИС] Запись: ${text.substring(0, 50)}`;
        const body = `🔧 НОВАЯ ГОЛОСОВАЯ ЗАПИСЬ\n\n${text}\n\nОтправлено из кабинета начальника.`;
        
        try {
            const response = await fetch("https://formsubmit.co/ajax/vimana-avto@yandex.ru", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    _subject: subject,
                    message: body,
                    _captcha: "false"
                })
            });
            return response.ok;
        } catch(err) {
            console.error(err);
            return false;
        }
    }

    // Добавить запись и отправить
    async function addAndSend() {
        if (!currentFullTranscript || currentFullTranscript.trim() === '') {
            showToast('❌ Сначала скажите фразу в микрофон');
            return;
        }
        
        const newRecord = {
            id: Date.now(),
            fullText: currentFullTranscript,
            createdAt: Date.now()
        };
        
        appointments.unshift(newRecord);
        if (appointments.length > 20) appointments.pop();
        saveAppointments();
        renderRecords();
        
        const sent = await sendEmail(currentFullTranscript);
        if (sent) {
            showToast('✅ Отправлено на vimana-avto@yandex.ru');
        } else {
            showToast('⚠️ Сохранено локально, но письмо не ушло');
        }
    }

    // Голосовое распознавание
    function initSpeech() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            voiceStatusBox.innerHTML = '⚠️ Ваш браузер не поддерживает голосовой ввод';
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'ru-RU';
        
        recognition.onstart = function() {
            isListening = true;
            micBtn.classList.add('listening');
            voiceStatusBox.innerHTML = '🎤 Слушаю... Говорите';
        };
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            currentFullTranscript = transcript;
            recognizedSpan.innerText = transcript;
            voiceStatusBox.innerHTML = `✅ Распознано: "${transcript.substring(0, 80)}"`;
            showToast('🎙️ Текст распознан, нажмите "Отправить"');
        };
        
        recognition.onerror = function(event) {
            console.error('Ошибка:', event.error);
            isListening = false;
            micBtn.classList.remove('listening');
            voiceStatusBox.innerHTML = '⚠️ Ошибка распознавания. Попробуйте ещё раз';
        };
        
        recognition.onend = function() {
            isListening = false;
            micBtn.classList.remove('listening');
            if (!currentFullTranscript) {
                voiceStatusBox.innerHTML = '💡 Нажмите микрофон и скажите фразу';
            }
        };
    }
    
    function startListening() {
        if (!recognition) {
            showToast('Голосовое распознавание не поддерживается');
            return;
        }
        if (isListening) {
            try { recognition.stop(); } catch(e) {}
        }
        try {
            recognition.start();
        } catch(e) {
            showToast('Ошибка запуска микрофона');
        }
    }

    // Обработчики
    loginBtn.addEventListener('click', doLogin);
    logoutBtn.addEventListener('click', doLogout);
    if (confirmBtn) confirmBtn.addEventListener('click', addAndSend);
    if (micBtn) micBtn.addEventListener('click', startListening);
    
    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doLogin();
    });
    
    // Запуск проверки
    checkAuth();
</script>
</body>
</html>
