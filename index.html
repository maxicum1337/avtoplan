<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>АвтоПлан | База данных записей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a32 0%, #0f1e24 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 64px;
            padding: 48px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            font-size: 2rem;
            color: #1a3b44;
            margin-bottom: 12px;
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            outline: none;
            margin-bottom: 20px;
        }

        .login-btn {
            background: #1f4e5e;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .login-btn:hover { background: #0f3a46; }
        .error-msg { color: #c44536; font-size: 0.85rem; margin-top: 16px; }

        .main-app { 
            display: none; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-bar {
            background: white;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            text-align: center;
            flex: 1;
            min-width: 150px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1f4e5e;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #6c8a97;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid #d0dee8;
            border-radius: 60px;
            background: white;
            cursor: pointer;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 56px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .header {
            background: #0f2b36;
            padding: 24px 32px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        .content {
            padding: 32px;
        }

        .voice-main-area {
            background: #f0f4fa;
            border-radius: 48px;
            padding: 20px 24px;
            margin-bottom: 28px;
        }

        .mic-button {
            background: #1e3b46;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 100px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.15s;
        }

        .mic-button.listening {
            background: #c44536;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }

        .voice-status-box {
            background: white;
            border-radius: 40px;
            padding: 14px 20px;
            margin-top: 18px;
            border-left: 5px solid #2c7da0;
        }

        .full-transcript-area {
            background: #e9f0f5;
            border-radius: 28px;
            padding: 12px 20px;
            margin-top: 12px;
        }

        button.primary {
            background: #0f2b36;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin: 16px 0;
        }

        .records-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e2edf7;
        }

        th {
            background: #f8fafd;
            color: #1f4e5e;
            font-weight: 700;
        }

        .delete-btn {
            background: #c44536;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background: #a03224;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 3000;
        }

        .admin-badge {
            background: #eab308;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            th, td {
                padding: 10px;
                font-size: 0.85rem;
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🔐 АвтоПлан PRO</h2>
        <p>База данных автосервиса</p>
        <input type="password" id="passwordInput" class="login-input" placeholder="Введите пароль">
        <button class="login-btn" id="loginBtn">🔓 Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="stats-bar" id="statsBar">
        <div class="stat-card">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Всего записей</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="todayCount">0</div>
            <div class="stat-label">За сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="weekCount">0</div>
            <div class="stat-label">За неделю</div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <h1>🔧 АвтоПлан | База данных</h1>
            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
        <div class="content">
            <div class="voice-main-area">
                <button class="mic-button" id="mainMicBtn">
                    🎙️ Голосовая запись в базу данных
                </button>
                <div class="voice-status-box" id="voiceStatusBox">
                    💡 Скажите фразу, запись сохранится в базу данных
                </div>
                <div class="full-transcript-area">
                    📝 <strong>Распознанный текст:</strong> <span id="recognizedFullText">—</span>
                </div>
            </div>

            <button class="primary" id="confirmRecordBtn">
                💾 Сохранить в базу данных и отправить на почту
            </button>

            <div class="controls">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск по записям...">
                <select id="filterSelect" class="filter-select">
                    <option value="all">Все записи</option>
                    <option value="today">Сегодня</option>
                    <option value="week">Эта неделя</option>
                    <option value="month">Этот месяц</option>
                </select>
            </div>

            <div class="records-table">
                <table id="recordsTable">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Время</th>
                            <th>Текст записи</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center;">Загрузка данных...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    const MASTER_PASSWORD = "BossAuto2025";
    let currentFullTranscript = "";
    let recognition = null;
    let isListening = false;
    let db = null;

    // Инициализация IndexedDB
    function initDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("AutoPlanDB", 1);
            
            request.onerror = function(event) {
                console.error("Ошибка БД:", event);
                reject("Не удалось открыть базу данных");
            };
            
            request.onsuccess = function(event) {
                db = event.target.result;
                console.log("База данных открыта");
                loadRecords();
                resolve();
            };
            
            request.onupgradeneeded = function(event) {
                const db = event.target.result;
                if (!db.objectStoreNames.contains("appointments")) {
                    const store = db.createObjectStore("appointments", { keyPath: "id", autoIncrement: true });
                    store.createIndex("date", "date", { unique: false });
                    store.createIndex("createdAt", "createdAt", { unique: false });
                    console.log("Таблица создана");
                }
            };
        });
    }

    // Сохранить запись в БД
    async function saveToDatabase(record) {
        return new Promise((resolve, reject) => {
            if (!db) {
                reject("База данных не инициализирована");
                return;
            }
            
            const transaction = db.transaction(["appointments"], "readwrite");
            const store = transaction.objectStore("appointments");
            
            const newRecord = {
                text: record.text,
                date: new Date().toISOString().split('T')[0],
                time: new Date().toLocaleTimeString('ru-RU'),
                createdAt: Date.now(),
                fullDate: new Date().toISOString()
            };
            
            const request = store.add(newRecord);
            
            request.onsuccess = function() {
                resolve();
            };
            
            request.onerror = function() {
                reject(request.error);
            };
        });
    }

    // Загрузить записи из БД
    function loadRecords(filter = "all", search = "") {
        if (!db) return;
        
        const transaction = db.transaction(["appointments"], "readonly");
        const store = transaction.objectStore("appointments");
        const index = store.index("createdAt");
        const request = index.openCursor(null, "prev");
        
        const records = [];
        
        request.onsuccess = function(event) {
            const cursor = event.target.result;
            if (cursor) {
                records.push(cursor.value);
                cursor.continue();
            } else {
                displayRecords(records, filter, search);
                updateStats(records);
            }
        };
    }

    // Отобразить записи
    function displayRecords(records, filter, search) {
        let filtered = [...records];
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
        
        // Фильтрация
        switch(filter) {
            case "today":
                filtered = records.filter(r => r.date === today);
                break;
            case "week":
                filtered = records.filter(r => new Date(r.createdAt) >= weekAgo);
                break;
            case "month":
                filtered = records.filter(r => new Date(r.createdAt) >= monthAgo);
                break;
        }
        
        // Поиск
        if (search) {
            const searchLower = search.toLowerCase();
            filtered = filtered.filter(r => r.text.toLowerCase().includes(searchLower));
        }
        
        // Отображение в таблице
        const tbody = document.getElementById("recordsTableBody");
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">📭 Нет записей</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map(record => `
            <tr>
                <td>${record.date}</td>
                <td>${record.time}</td>
                <td>${escapeHtml(record.text)}</td>
                <td><button class="delete-btn" onclick="deleteRecord(${record.id})">🗑️ Удалить</button></td>
            </tr>
        `).join('');
    }

    // Удалить запись
    window.deleteRecord = function(id) {
        if (!db) return;
        
        const transaction = db.transaction(["appointments"], "readwrite");
        const store = transaction.objectStore("appointments");
        const request = store.delete(id);
        
        request.onsuccess = function() {
            showToast("✅ Запись удалена");
            loadRecords(document.getElementById("filterSelect").value, document.getElementById("searchInput").value);
        };
        
        request.onerror = function() {
            showToast("❌ Ошибка удаления");
        };
    };

    // Обновить статистику
    function updateStats(records) {
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        
        const todayCount = records.filter(r => r.date === today).length;
        const weekCount = records.filter(r => new Date(r.createdAt) >= weekAgo).length;
        
        document.getElementById("totalCount").textContent = records.length;
        document.getElementById("todayCount").textContent = todayCount;
        document.getElementById("weekCount").textContent = weekCount;
    }

    // Отправить email
    async function sendEmail(text) {
        const email = "vimana-avto@yandex.ru";
        const subject = `[АВТОСЕРВИС] Новая запись в БД: ${text.substring(0, 50)}`;
        const body = `🔧 НОВАЯ ЗАПИСЬ В БАЗЕ ДАННЫХ\n\n📝 Текст: ${text}\n\n🕐 Дата: ${new Date().toLocaleString('ru-RU')}\n\nСохранено в базе данных АвтоПлан.`;
        
        try {
            const response = await fetch("https://formsubmit.co/ajax/vimana-avto@yandex.ru", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    _subject: subject,
                    message: body,
                    _captcha: "false"
                })
            });
            return response.ok;
        } catch(err) {
            console.error(err);
            return false;
        }
    }

    // Сохранить запись
    async function saveRecord() {
        if (!currentFullTranscript || currentFullTranscript.trim() === "") {
            showToast("❌ Сначала скажите фразу в микрофон");
            return;
        }
        
        try {
            await saveToDatabase({ text: currentFullTranscript });
            await sendEmail(currentFullTranscript);
            
            showToast("✅ Запись сохранена в БД и отправлена на почту");
            loadRecords(document.getElementById("filterSelect").value, document.getElementById("searchInput").value);
            
            // Очищаем текущий текст
            currentFullTranscript = "";
            document.getElementById("recognizedFullText").textContent = "—";
        } catch(error) {
            showToast("❌ Ошибка сохранения: " + error);
        }
    }

    // Голосовое распознавание
    function initSpeech() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            document.getElementById("voiceStatusBox").innerHTML = '⚠️ Ваш браузер не поддерживает голосовой ввод';
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'ru-RU';
        
        recognition.onstart = function() {
            isListening = true;
            document.getElementById("mainMicBtn").classList.add('listening');
            document.getElementById("voiceStatusBox").innerHTML = '🎤 Слушаю... Говорите чётко';
        };
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            currentFullTranscript = transcript;
            document.getElementById("recognizedFullText").textContent = transcript;
            document.getElementById("voiceStatusBox").innerHTML = `✅ Распознано: "${transcript.substring(0, 80)}"`;
            showToast('🎙️ Текст распознан, нажмите "Сохранить"');
        };
        
        recognition.onerror = function(event) {
            isListening = false;
            document.getElementById("mainMicBtn").classList.remove('listening');
            document.getElementById("voiceStatusBox").innerHTML = '⚠️ Ошибка распознавания. Попробуйте ещё раз';
        };
        
        recognition.onend = function() {
            isListening = false;
            document.getElementById("mainMicBtn").classList.remove('listening');
        };
    }
    
    function startListening() {
        if (!recognition) {
            showToast('Голосовое распознавание не поддерживается');
            return;
        }
        if (isListening) {
            try { recognition.stop(); } catch(e) {}
        }
        try {
            recognition.start();
        } catch(e) {
            showToast('Ошибка запуска микрофона');
        }
    }
